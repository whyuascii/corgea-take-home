name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            docker:
              - 'backend/Dockerfile'
              - 'frontend/Dockerfile'
              - 'backend/pyproject.toml'
              - 'backend/uv.lock'
              - 'frontend/package-lock.json'

  backend-lint:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.6.12"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Run ruff
        run: uvx ruff check backend/

  backend-test:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: vulntracker_test
          POSTGRES_USER: vulntracker
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vulntracker"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DJANGO_SETTINGS_MODULE: config.settings.local
      POSTGRES_DB: vulntracker_test
      POSTGRES_USER: vulntracker
      POSTGRES_PASSWORD: testpassword
      DB_HOST: localhost
      DB_PORT: "5432"
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.6.12"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies and run tests
        working-directory: backend
        run: |
          uv sync --all-extras
          uv run pytest --cov --cov-report=term-missing --cov-report=xml:coverage.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml
          retention-days: 30

  backend-security:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.6.12"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: uv sync --all-extras

      - name: Run pip-audit and bandit
        working-directory: backend
        run: |
          uv pip compile pyproject.toml -o requirements.txt
          uvx pip-audit -r requirements.txt
          uv run bandit -r . -c pyproject.toml -f json -o bandit-report.json || true
          uv run bandit -r . -c pyproject.toml

      - name: Run semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            auto
            p/owasp-top-ten
            p/python
        env:
          SEMGREP_BASELINE_REF: ${{ github.event.pull_request.base.ref || '' }}

      - name: Run Django security checks
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.local
          DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
          DB_HOST: localhost
        run: uv run python manage.py check --deploy --fail-level WARNING 2>&1 || true

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: backend/bandit-report.json
          retention-days: 30

  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Audit
        working-directory: frontend
        run: npm audit --audit-level=high || true

      - name: Build
        working-directory: frontend
        run: npm run build

  docker-build-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: vulntracker-backend:ci-${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Save image for scanning
        run: docker save vulntracker-backend:ci-${{ github.sha }} | gzip > /tmp/backend-image.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-image
          path: /tmp/backend-image.tar.gz
          retention-days: 1

  docker-build-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: vulntracker-frontend:ci-${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  container-security:
    needs: docker-build-backend
    runs-on: ubuntu-latest
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-image
          path: /tmp

      - name: Load image
        run: gunzip -c /tmp/backend-image.tar.gz | docker load

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "vulntracker-backend:ci-${{ github.sha }}"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

      - name: Run Trivy (full report)
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "vulntracker-backend:ci-${{ github.sha }}"
          format: "json"
          output: "trivy-report.json"
          severity: "CRITICAL,HIGH,MEDIUM"

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json
          retention-days: 30
